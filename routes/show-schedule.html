<style>
/* Schedule-specific styles */
.schedule-container {
    max-width: 900px;
    margin: 0 auto;
}

.day-card {
    background: var(--card-bg);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    margin-bottom: 1rem;
    overflow: hidden;
    transition: all 0.3s ease;
    background-color: #eee;
}

.day-card:hover {
    border-color: #999;
}

.day-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5rem;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s ease;
}

.day-header:hover {
    background: rgba(255, 255, 255, 0.03);
}

.day-title {
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--primary-dark);
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.day-emoji {
    font-size: 1.5rem;
}

.dropdown-icon {
    font-size: 1.5rem;
    transition: transform 0.3s ease;
    color: var(--primary-dark);
}

.day-card.active .dropdown-icon {
    transform: rotate(180deg);
}

.day-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
    padding: 0 1.5rem;
}

.day-card.active .day-content {
    max-height: fit-content;
    padding: 0 1.5rem 1.5rem 1.5rem;
}

.show-item {
    padding: 1rem;
    margin-bottom: 0.75rem;
    background: rgba(255, 255, 255, 0.03);
    border-left: 3px solid var(--primary-dark);
    border-radius: 4px;
    transition: all 0.2s ease;
}

.show-item:hover {
    background: rgba(255, 255, 255, 0.05);
    border-left-color: var(--primary-dark);
    transform: translateX(5px);
}

.show-time {
    font-weight: 700;
    color: var(--primary-dark);
    font-size: 0.95rem;
    margin-bottom: 0.25rem;
}

.show-title {
    font-weight: 600;
    color: var(--primary-dark);
    font-size: 1.05rem;
    margin-bottom: 0.25rem;
}

.show-description {
    color: var(--primary-dark);
    font-size: 0.9rem;
    line-height: 1.4;
}

/* Quick Actions */
.quick-actions {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
}

.action-btn {
    padding: 0.65rem 1.25rem;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 6px;
    color: var(--primary-dark);
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s ease;
}

.action-btn:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: var(--primary-dark);
    color: var(--primary-dark);
}


/* Mobile Responsive */
@media (max-width: 1000px) {
    .day-header {
        padding: 1.25rem 1rem;
    }

    .day-title {
        font-size: 1.1rem;
    }

    .day-emoji {
        font-size: 1.3rem;
    }

    .day-card.active .day-content {
        padding: 0 1rem 1rem 1rem;
    }

    .show-item {
        padding: 0.85rem;
    }

    .show-time {
        font-size: 0.85rem;
    }

    .show-title {
        font-size: 1rem;
    }

    .show-description {
        font-size: 0.85rem;
    }

    .quick-actions {
        gap: 0.5rem;
    }

    .action-btn {
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
    }
}
</style>

<div class="content-container">
    <div class="hero">
        <h1>Show Schedule</h1>
        <p>Your guide to RDU's weekly programming</p>
    </div>

    <div class="card">
        <h2>Weekly Schedule</h2>
        <p>Here’s what shows are being broadcast on RDU this week.</p>
    </div>

    <div class="schedule-container">
        <div class="quick-actions">
            <button class="action-btn">Today's Schedule</button>
        </div>

        <div id="schedule-days">
            {{SCHEDULE_CONTENT}}
        </div>

    </div>
</div>
