<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 80px auto; padding: 0 16px; }
    h1 { font-size: 1.2rem; margin-bottom: 24px; }
    label { display: block; margin-bottom: 4px; font-size: .9rem; }
    input { display: block; width: 100%; padding: 8px; margin-bottom: 16px; font-size: 1rem; box-sizing: border-box; }
    button { padding: 8px 20px; font-size: 1rem; cursor: pointer; }
    #error { color: red; margin-top: 12px; font-size: .9rem; }
	.card {
		height: 110px;
  		position: relative;
		vertical-align: middle;
		margin: 5px;
		border-radius: 5px;
		background-color: #eee;
	}
	.card > a {
		position: absolute;
		top: 25px;
	}
	.card * {
		margin: 5px;
	}
  </style>
</head>
<body>

<div id="login-screen">
  <h1>Admin Login</h1>
  <p><i>The admin page is temporarily deactivated to avoid syncing issues. If this persists, contact the server admin.</i></p>
  <p><i>Please try again later.</i></p>
</div>
</body>
</html>
